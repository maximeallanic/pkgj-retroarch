name: Release pkgj-retroarch

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  # ── Build PS Vita .vpk ────────────────────────────────────────────────────────
  build-vita:
    name: Build pkgj.vpk (vitasdk/vitasdk)
    runs-on: ubuntu-24.04
    container:
      image: vitasdk/vitasdk

    steps:
      - uses: actions/checkout@v4

      - name: Install missing build tools
        run: |
          pacman -Sy --noconfirm --needed python python-pip git ninja cmake gcc

      - name: Install Poetry
        run: python -m pip install 'poetry<2.0' --break-system-packages

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-vita-archlinux-${{ hashFiles('ci/**/*.py', 'conanfile.py') }}
          restore-keys: conan-vita-archlinux-

      - name: Setup Conan
        working-directory: ci
        run: ./setup_conan.sh

      - name: Build pkgj.vpk
        run: |
          mkdir -p ci/build && cd ci/build
          poetry run conan install ../.. \
            --build missing \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .
          poetry run conan build ../.. \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .

      - name: Upload pkgj.vpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgj-retroarch-vpk
          path: ci/build/pkgj.vpk
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build-vita
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download .vpk artifact
        uses: actions/download-artifact@v4
        with:
          name: pkgj-retroarch-vpk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"beta"* || "$TAG" == *"alpha"* || "$TAG" == *"rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "pkgj-retroarch $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "pkgj.vpk#pkgj-retroarch-${TAG}.vpk"
