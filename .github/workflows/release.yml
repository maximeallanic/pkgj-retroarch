name: Release pkgj-retroarch

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  # ── Build PS Vita .vpk ────────────────────────────────────────────────────────
  build-vita:
    name: Build pkgj.vpk (vitasdk/vitasdk)
    runs-on: ubuntu-24.04
    container:
      image: vitasdk/vitasdk

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apk add --no-cache py3-pip ninja gcc g++ musl-dev

      - name: Install Conan
        run: pip3 install "conan>=2.0.7,<3" --break-system-packages

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-vita-alpine-${{ hashFiles('ci/**/*.py', 'conanfile.py') }}
          restore-keys: conan-vita-alpine-

      - name: Setup Conan profiles and export local packages
        run: |
          conan profile detect
          mkdir -p ~/.conan2/profiles
          cp ci/conan/profiles/vita ~/.conan2/profiles/vita
          cp ci/conan/settings.yml ~/.conan2/settings.yml
          cd ci
          conan export conan-vitasdk
          conan export conan-fmt
          conan export conan-libzip
          conan export conan-vitasqlite

      - name: Install Conan dependencies
        run: |
          mkdir -p ci/build && cd ci/build
          conan install ../.. \
            --build missing \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .

      - name: Build pkgj.vpk
        run: |
          cd ci/build
          conan build ../.. \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .

      - name: Upload pkgj.vpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgj-retroarch-vpk
          path: ci/build/pkgj.vpk
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build-vita
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download .vpk artifact
        uses: actions/download-artifact@v4
        with:
          name: pkgj-retroarch-vpk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"beta"* || "$TAG" == *"alpha"* || "$TAG" == *"rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "pkgj-retroarch $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "pkgj.vpk#pkgj-retroarch-${TAG}.vpk"
