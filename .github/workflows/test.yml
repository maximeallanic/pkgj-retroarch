name: unit-tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-12 libsqlite3-dev
      - name: Build and run pure-logic tests
        env:
          CXX: g++-12
        run: ./tests/run.sh
