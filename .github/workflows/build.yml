name: Build pkgj-retroarch

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build PS Vita .vpk (vitasdk/vitasdk)
    runs-on: ubuntu-24.04
    container:
      image: vitasdk/vitasdk

    steps:
      - uses: actions/checkout@v4

      # vitasdk/vitasdk is Arch Linux based — use pacman.
      # Most tools (python, cmake, ninja, git, gcc) are pre-installed in the image;
      # we only ensure they are present and install Poetry via pip.
      - name: Install missing build tools
        run: |
          pacman -Sy --noconfirm --needed python python-pip git ninja cmake gcc

      - name: Install Poetry
        run: python -m pip install 'poetry<2.0' --break-system-packages

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-vita-archlinux-${{ hashFiles('ci/**/*.py', 'conanfile.py') }}
          restore-keys: conan-vita-archlinux-

      - name: Setup Conan
        working-directory: ci
        run: ./setup_conan.sh

      - name: Build pkgj.vpk
        run: |
          mkdir -p ci/build && cd ci/build
          poetry run conan install ../.. \
            --build missing \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .
          poetry run conan build ../.. \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .

      - name: Upload pkgj.vpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgj-retroarch
          path: ci/build/pkgj.vpk
          if-no-files-found: error
