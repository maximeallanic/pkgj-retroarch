name: Build pkgj-retroarch

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build PS Vita .vpk (vitasdk/vitasdk)
    runs-on: ubuntu-24.04
    container:
      image: vitasdk/vitasdk

    steps:
      - uses: actions/checkout@v4

      # vitasdk/vitasdk = Alpine Linux, runs as root, has python3 + cmake + git.
      # ninja and host gcc/g++ are needed; pip/poetry are installed manually.
      - name: Install build tools
        run: |
          apk add --no-cache py3-pip ninja gcc g++ musl-dev

      # The poetry.lock pins pyyaml 6.0 which fails to build on Python 3.14
      # (the version shipped in current vitasdk/vitasdk). Bypass poetry entirely:
      # install conan directly via pip with no version lock.
      - name: Install Conan
        run: pip3 install "conan>=2.0.7,<3" --break-system-packages

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-vita-alpine-${{ hashFiles('ci/**/*.py', 'conanfile.py') }}
          restore-keys: conan-vita-alpine-

      - name: Setup Conan profiles and export local packages
        run: |
          # Create default host profile (detects gcc from apk)
          conan profile detect

          # Install vita cross-compilation profile
          mkdir -p ~/.conan2/profiles
          cp ci/conan/profiles/vita ~/.conan2/profiles/vita

          # Install PSVita custom settings (adds PSVita os target)
          cp ci/conan/settings.yml ~/.conan2/settings.yml

          # Export the bundled Conan recipes from ci/
          cd ci
          # Export the Docker-aware vitasdk recipe FIRST — it satisfies the
          # vitasdk-toolchain requirement using the container's musl-linked vitasdk
          # instead of downloading the glibc-only binary (which fails on Alpine).
          conan export conan-vitasdk-docker
          conan export conan-fmt
          conan export conan-libzip
          conan export conan-vitasqlite

      - name: Install Conan dependencies
        run: |
          mkdir -p ci/build && cd ci/build
          # CMAKE_POLICY_VERSION_MINIMUM=3.5 is required because Alpine ships
          # CMake 4.x which removed backward compat with cmake_minimum_required < 3.5.
          conan install ../.. \
            --build missing \
            -s build_type=Release \
            --profile:host vita \
            --output-folder . \
            --conf "tools.cmake.cmaketoolchain:extra_variables={\"CMAKE_POLICY_VERSION_MINIMUM\": \"3.5\"}"

      - name: Build pkgj.vpk
        run: |
          cd ci/build
          conan build ../.. \
            -s build_type=Release \
            --profile:host vita \
            --output-folder .

      - name: Upload pkgj.vpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgj-retroarch
          path: ci/build/pkgj.vpk
          if-no-files-found: error
